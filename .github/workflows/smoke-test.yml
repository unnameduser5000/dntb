name: Smoke Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: |
          git lfs pull
          echo "--- git lfs status ---"
          git lfs status
          echo "--- git lfs checkout ---"
          git lfs checkout

      - name: Verify MP3 binaries
        run: |
          echo "=== music/ file sizes ==="
          wc -c music/*.mp3 || true
          echo "=== first line of first MP3 ==="
          head -c 80 "music/Pixel Dungeon.mp3" | xxd | head -3 || true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.7.0
          use-dotnet: false
          include-templates: false

      - name: Import project assets
        run: godot --headless --path . --import

      - name: Run smoke test
        run: godot --headless --path . --script res://scripts/tests/SmokeTest.gd
