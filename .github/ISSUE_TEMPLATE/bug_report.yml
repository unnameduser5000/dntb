name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest reliable reproduction steps.
      placeholder: |
        1. Start a run
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: godot-version
    attributes:
      label: Godot version
      placeholder: 4.7.stable
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS, Linux
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output only. Do not include secrets.
